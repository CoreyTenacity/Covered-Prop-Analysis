# Candidate F production pipeline — PUBLIC repo (CoreyTenacity/Covered-Prop-Analysis).
# Runs on a free public standard runner, checks out the pinned PRIVATE Covered SHA into a temp dir
# via a read-only credential, and runs the existing pipeline. Private source never enters the public
# repo/artifacts/caches/logs. Proven live: WNBA run 29535784558, MLB run 29536975916.
#
# PIN NAMESPACE: COVERED_PRIVATE_PIPELINE_SHA_V2 is the active production pin. The legacy
# COVERED_PRIVATE_PIPELINE_SHA variable is intentionally retired so an unrecoverable queued
# workflow from the pre-cutover generation fails closed before private checkout.
#
# SCHEDULING SAFETY: scheduled runs are gated by the job-level `if:` on COVERED_GITHUB_SCHEDULER_ENABLED,
# so this file is SAFE TO MERGE while that var is `false` — no scheduled run executes until it flips to
# `true`. Manual workflow_dispatch always runs regardless.

name: Covered Production Pipeline

on:
  workflow_dispatch:
    inputs:
      league:
        description: League to run (MLB or WNBA)
        required: true
        type: choice
        options: [WNBA, MLB]
      dry_run:
        description: Dry run (no production writes)
        required: true
        type: boolean
        default: true
      config_limit:
        description: SharpAPI configs this run (WNBA ~8, MLB ~10; provider margin protected by spacing)
        required: true
        type: string
        default: "1"
      run_scoring:
        description: Run scoring phase
        required: true
        type: boolean
        default: true
      run_board:
        description: Run board build + snapshot publication
        required: true
        type: boolean
        default: true
  schedule:
    # UTC. July 2026 = EDT (UTC-4). Game-window gating lives INSIDE the pipeline (it skips fast when no
    # game qualifies), so these windows are bounded to game hours to avoid needless overnight runs.
    # Staggered by 10 min so WNBA and MLB never fire on the same minute (shared concurrency also serializes).
    - cron: "0,20,40 22,23,0,1,2,3,4 * * *"       # WNBA — every 20 min, ~6:00pm–1:00am ET
    - cron: "10,30,50 16,17,18,19,20,21,22,23,0,1,2,3,4 * * *"  # MLB — every 20 min, ~12:10pm–1:00am ET

permissions:
  contents: read

concurrency:
  group: covered-production-sharpapi
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # NOTE: the scheduler kill-switch is NOT gated here. Environment-scoped variables
    # (COVERED_GITHUB_SCHEDULER_ENABLED lives in the `production` Environment) are NOT visible in a
    # job-level `if:` — the environment only resolves after `if:` passes — so gating here would skip
    # EVERY scheduled run (observed: run 29540597005 skipped). The kill-switch is enforced inside the
    # "Resolve run parameters" step instead, where environment vars ARE available.
    environment: production
    env:
      SHARPAPI_MAX_REQUESTS_PER_MINUTE: ${{ vars.SHARPAPI_MAX_REQUESTS_PER_MINUTE }}
      SHARPAPI_REQUEST_SPACING_MS: ${{ vars.SHARPAPI_REQUEST_SPACING_MS }}
      KNOWLEDGE_LOW_EGRESS_MODE: ${{ vars.KNOWLEDGE_LOW_EGRESS_MODE }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      COVERED_GITHUB_SCHEDULER_ENABLED: ${{ vars.COVERED_GITHUB_SCHEDULER_ENABLED }}
      WNBA_INGESTION_ENABLED: ${{ vars.WNBA_INGESTION_ENABLED }}
    steps:
      - name: Resolve run parameters (dispatch inputs, or map schedule cron -> league)
        id: params
        env:
          SCHED: ${{ github.event.schedule }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            LEAGUE="${{ github.event.inputs.league }}"
            DRY="${{ github.event.inputs.dry_run }}"
            CFG="${{ github.event.inputs.config_limit }}"
            SCORING="${{ github.event.inputs.run_scoring }}"
            BOARD="${{ github.event.inputs.run_board }}"
          else
            # Scheduler kill-switch — enforced HERE (env vars are available to steps, unlike job `if:`).
            if [ "${COVERED_GITHUB_SCHEDULER_ENABLED}" != "true" ]; then
              echo "Scheduler disabled (COVERED_GITHUB_SCHEDULER_ENABLED != true); skipping scheduled run."
              echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0
            fi
            DRY="false"; SCORING="true"; BOARD="true"
            case "$SCHED" in
              "0,20,40 22,23,0,1,2,3,4 * * *") LEAGUE="WNBA"; CFG="8" ;;
              "10,30,50 16,17,18,19,20,21,22,23,0,1,2,3,4 * * *") LEAGUE="MLB"; CFG="10" ;;
              *) echo "::error::Unrecognized schedule cron: $SCHED"; exit 1 ;;
            esac
            # WNBA-specific gate for scheduled runs; manual dispatch is unaffected.
            if [ "$LEAGUE" = "WNBA" ] && [ "${WNBA_INGESTION_ENABLED}" != "true" ]; then
              echo "WNBA scheduled ingestion disabled (WNBA_INGESTION_ENABLED != true); skipping."
              echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0
            fi
          fi
          { echo "league=$LEAGUE"; echo "dry_run=$DRY"; echo "config_limit=$CFG";
            echo "run_scoring=$SCORING"; echo "run_board=$BOARD"; echo "skip=false"; } >> "$GITHUB_OUTPUT"

      - name: Fail closed if the pinned private SHA is missing/malformed
        if: steps.params.outputs.skip != 'true'
        env:
          PIN: ${{ vars.COVERED_PRIVATE_PIPELINE_SHA_V2 }}
        run: |
          if ! printf '%s' "$PIN" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "::error::COVERED_PRIVATE_PIPELINE_SHA_V2 is missing or not a full 40-char SHA. Refusing to run."
            exit 1
          fi
          echo "Pinned private SHA present (value not printed)."

      - name: Check out PRIVATE Covered repo at the pinned SHA (into ./private-covered)
        if: steps.params.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          repository: CoreyTenacity/Covered
          ref: ${{ vars.COVERED_PRIVATE_PIPELINE_SHA_V2 }}
          token: ${{ secrets.COVERED_PRIVATE_REPO_TOKEN }}   # read-only, single-repo, Contents:read
          path: private-covered
          persist-credentials: false
          fetch-depth: 1

      - name: Verify checkout is exactly the approved SHA
        if: steps.params.outputs.skip != 'true'
        working-directory: private-covered
        run: |
          GOT="$(git rev-parse HEAD)"
          EXP="${{ vars.COVERED_PRIVATE_PIPELINE_SHA_V2 }}"
          if [ "$GOT" != "$EXP" ]; then
            echo "::error::Private checkout HEAD does not match the approved SHA."
            exit 1
          fi
          echo "Private checkout pinned correctly."

      - name: Set up pnpm
        if: steps.params.outputs.skip != 'true'
        uses: pnpm/action-setup@v4
        with:
          # Pinned because the workspace root has no package.json to auto-detect from (only the PRIVATE
          # repo is checked out, into ./private-covered). Matches the private packageManager (pnpm@10.13.1).
          version: 10.13.1

      - name: Set up Node
        if: steps.params.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          # Intentionally NO `cache: pnpm` — never cache the private tree's dependencies publicly.

      - name: Install (private checkout, from lockfile)
        if: steps.params.outputs.skip != 'true'
        working-directory: private-covered
        run: pnpm install --frozen-lockfile

      - name: Run production pipeline
        if: steps.params.outputs.skip != 'true'
        working-directory: private-covered
        env:
          # Production credentials — main-restricted `production` Environment secrets. Auto-masked in logs.
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SHARPAPI_KEY: ${{ secrets.SHARPAPI_KEY }}
          BBS_API_KEY: ${{ secrets.BBS_API_KEY }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          SHARPAPI_CONFIGS_PER_RUN: ${{ steps.params.outputs.config_limit }}
        run: |
          # No `set -x`, no `env` dump, no verbose HTTP debug — public logs are world-readable.
          pnpm run cron:run -- github-actions \
            --trigger "${GITHUB_EVENT_NAME}" \
            --league "${{ steps.params.outputs.league }}" \
            --configLimit "${SHARPAPI_CONFIGS_PER_RUN}" \
            --runScoring "${{ steps.params.outputs.run_scoring }}" \
            --runBoard "${{ steps.params.outputs.run_board }}" \
            --dryRun "${{ steps.params.outputs.dry_run }}" \
            --publishPublicSnapshots "${{ steps.params.outputs.run_board }}" \
            --pregameWindowHours "6" \
            --pregameCloseBufferMinutes "5" \
            --enabled "true"

      - name: Cleanup private checkout (defense in depth; runner is ephemeral anyway)
        if: always()
        run: rm -rf private-covered

# Do NOT add: upload-artifact of private-covered, actions/cache of it, `set -x`, env dumps,
# pull_request / pull_request_target triggers, or any deploy step. See Session 18 leakage matrix.
