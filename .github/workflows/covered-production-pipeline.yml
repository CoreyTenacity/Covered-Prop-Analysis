# STAGED DELIVERABLE — Candidate F production pipeline for the PUBLIC repo
# (CoreyTenacity/Covered-Prop-Analysis). Place at .github/workflows/covered-production-pipeline.yml
# in the PUBLIC repo ONLY AFTER completing the owner-only prerequisites documented in
# docs/AGENT_HANDOFF.md "Session 18" (read-only checkout credential, `production` Environment +
# secrets, `main` branch protection, and the COVERED_PRIVATE_PIPELINE_SHA variable).
#
# This workflow runs in the PUBLIC repo (free standard-runner minutes), checks out the PRIVATE
# Covered repo at a pinned reviewed SHA into a temporary directory, and runs the existing pipeline
# from there. Private SOURCE never enters the public repo, artifacts, caches, or logs.
#
# NOTE: `schedule:` is intentionally OMITTED here — this is workflow_dispatch-only until both MLB and
# WNBA real proof runs pass and the live UI is verified (then add the staggered cron per Session 18).

name: Covered Production Pipeline

on:
  workflow_dispatch:
    inputs:
      league:
        description: League to run (MLB or WNBA)
        required: true
        type: choice
        options: [WNBA, MLB]
      dry_run:
        description: Dry run (no production writes)
        required: true
        type: boolean
        default: true
      config_limit:
        description: SharpAPI configs this run (WNBA 6-10, MLB 8-12; do not exceed provider margin)
        required: true
        type: string
        default: "1"
      run_scoring:
        description: Run scoring phase
        required: true
        type: boolean
        default: true
      run_board:
        description: Run board build + snapshot publication
        required: true
        type: boolean
        default: true

# Least privilege: the job only needs to read the public checkout; the private checkout uses the
# Environment secret, not GITHUB_TOKEN.
permissions:
  contents: read

# Shared across ALL SharpAPI production execution so MLB and WNBA never pull the shared key at the
# same time. Queue (do NOT cancel) so an in-flight ingestion is never severed mid-run.
concurrency:
  group: covered-production-sharpapi
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Binds Environment secrets + the main-only deployment-branch restriction to this job.
    environment: production
    env:
      # Non-sensitive controls come from public repo Variables.
      SHARPAPI_MAX_REQUESTS_PER_MINUTE: ${{ vars.SHARPAPI_MAX_REQUESTS_PER_MINUTE }}
      SHARPAPI_REQUEST_SPACING_MS: ${{ vars.SHARPAPI_REQUEST_SPACING_MS }}
      SHARPAPI_CONFIGS_PER_RUN: ${{ github.event.inputs.config_limit }}
      KNOWLEDGE_LOW_EGRESS_MODE: ${{ vars.KNOWLEDGE_LOW_EGRESS_MODE }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      COVERED_GITHUB_SCHEDULER_ENABLED: ${{ vars.COVERED_GITHUB_SCHEDULER_ENABLED }}
      WNBA_INGESTION_ENABLED: ${{ vars.WNBA_INGESTION_ENABLED }}
    steps:
      - name: Fail closed if the pinned private SHA is missing/malformed
        env:
          PIN: ${{ vars.COVERED_PRIVATE_PIPELINE_SHA }}
        run: |
          if ! printf '%s' "$PIN" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "::error::COVERED_PRIVATE_PIPELINE_SHA is missing or not a full 40-char SHA. Refusing to run."
            exit 1
          fi
          echo "Pinned private SHA present (value not printed)."

      - name: Check out PRIVATE Covered repo at the pinned SHA (into ./private-covered)
        uses: actions/checkout@v4
        with:
          repository: CoreyTenacity/Covered
          ref: ${{ vars.COVERED_PRIVATE_PIPELINE_SHA }}
          token: ${{ secrets.COVERED_PRIVATE_REPO_TOKEN }}   # read-only, single-repo, Contents:read
          path: private-covered
          persist-credentials: false
          fetch-depth: 1

      - name: Verify checkout is exactly the approved SHA
        working-directory: private-covered
        run: |
          GOT="$(git rev-parse HEAD)"
          EXP="${{ vars.COVERED_PRIVATE_PIPELINE_SHA }}"
          if [ "$GOT" != "$EXP" ]; then
            echo "::error::Private checkout HEAD does not match the approved SHA."
            exit 1
          fi
          echo "Private checkout pinned correctly."

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          # Intentionally NO `cache: pnpm` — never cache the private tree's dependencies publicly.

      - name: Install (private checkout, from lockfile)
        working-directory: private-covered
        run: pnpm install --frozen-lockfile

      - name: Run production pipeline
        working-directory: private-covered
        env:
          # Production credentials — main-restricted `production` Environment secrets. Auto-masked in logs.
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SHARPAPI_KEY: ${{ secrets.SHARPAPI_KEY }}
          BBS_API_KEY: ${{ secrets.BBS_API_KEY }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          # No `set -x`, no `env` dump, no verbose HTTP debug — public logs are world-readable.
          pnpm run cron:run -- github-actions \
            --trigger "${GITHUB_EVENT_NAME}" \
            --league "${{ github.event.inputs.league }}" \
            --configLimit "${SHARPAPI_CONFIGS_PER_RUN}" \
            --runScoring "${{ github.event.inputs.run_scoring }}" \
            --runBoard "${{ github.event.inputs.run_board }}" \
            --dryRun "${{ github.event.inputs.dry_run }}" \
            --publishPublicSnapshots "${{ github.event.inputs.run_board }}" \
            --pregameWindowHours "6" \
            --pregameCloseBufferMinutes "5" \
            --enabled "true"

      - name: Cleanup private checkout (defense in depth; runner is ephemeral anyway)
        if: always()
        run: rm -rf private-covered

# Do NOT add: upload-artifact of private-covered, actions/cache of it, `set -x`, env dumps,
# pull_request / pull_request_target triggers, or any deploy step. See Session 18 leakage matrix.
